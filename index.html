<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>요신번역기</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">
    
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%234285F4%22/><text x=%2250%22 y=%2250%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2260%22>🇰🇷</text></svg>">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇰🇷</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#4285F4',
                        'secondary': '#34A853',
                        'accent': '#FBBC05',
                        'background-dark': '#1F2937',
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.3s ease-out forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* v6.9: 穩定版樣式 */
        * {
            -webkit-user-select: text !important;
            user-select: text !important;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
        }

        body {
            touch-action: manipulation;
            -webkit-overflow-scrolling: touch;
        }

        textarea, input {
            -webkit-appearance: none;
            border-radius: 0;
            font-size: 16px !important; 
            transform: translate3d(0,0,0);
            z-index: 9999 !important; 
            position: relative;
        }

        button {
            -webkit-user-select: none !important;
            user-select: none !important;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .text-area-glow:focus { box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.3); }
        .typing-indicator::after { content: '...'; animation: typing 1.5s infinite; }
        @keyframes typing { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }
        
        .editable-card textarea:focus { background-color: rgba(255, 255, 255, 0.95); }
        .editing-indicator { animation: pulse-border 2s infinite; border-color: #FBBC05; }
        @keyframes pulse-border { 0% { border-color: #e5e7eb; } 50% { border-color: #FBBC05; } 100% { border-color: #e5e7eb; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800 pb-safe">

    <!-- 伺服器模式提示 -->
    <div id="apiKeyModal" class="fixed inset-0 bg-gray-900/90 backdrop-blur-sm flex items-center justify-center z-[10000] hidden p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm">
            <h2 class="text-xl font-bold mb-3 text-gray-800 flex items-center">☁️ 雲端部署模式</h2>
            <p class="text-gray-600 mb-4 text-sm leading-relaxed">
                API Key 由伺服器環境變數管理，前端不需設定。
            </p>
            <div class="flex justify-end space-x-3">
                <button id="saveApiKeyBtn" class="bg-primary text-white px-5 py-2.5 rounded-xl hover:bg-blue-600 transition font-bold w-full shadow-lg shadow-blue-200">知道了</button>
            </div>
        </div>
    </div>

    <div id="app" class="max-w-md mx-auto p-4 sm:p-6 min-h-screen flex flex-col">
        <!-- 頂部導航 -->
        <header class="flex justify-between items-center mb-6 pt-2 select-none">
            <div>
                <h1 class="text-2xl font-extrabold text-primary tracking-tight">요신번역기</h1>
                <p class="text-gray-400 text-xs font-medium">學習專用版 v6.9</p>
            </div>
            
            <div class="flex items-center space-x-2">
                <div class="relative">
                    <select id="toneSelect" class="appearance-none bg-white border border-gray-200 text-gray-600 py-1.5 pl-3 pr-8 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary text-xs font-bold relative z-10">
                        <option value="plain">🗣️ 平語</option>
                        <option value="polite">🙇 敬語</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-400 z-10">
                        <svg class="fill-current h-3 w-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                    </div>
                </div>

                <button id="settingsBtn" class="text-gray-400 hover:text-primary p-2 rounded-full active:bg-gray-100 transition relative z-10">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>
            </div>
        </header>

        <main class="flex-grow flex flex-col space-y-4">
            <!-- 輸入區塊 -->
            <div class="relative group">
                <div class="flex justify-between items-end mb-2 px-1">
                    <label class="block text-sm font-bold text-gray-600">輸入內容 (韓/中)</label>
                    <span id="typingStatus" class="text-xs text-primary font-bold hidden bg-blue-50 px-2 py-0.5 rounded-full">
                        <span class="typing-indicator">等待輸入...</span>
                    </span>
                </div>
                <!-- 輸入框 (z-index 提高) -->
                <div class="relative shadow-sm rounded-2xl bg-white">
                    <textarea id="inputText" rows="3" 
                        class="w-full p-4 bg-white border border-gray-200 rounded-2xl focus:ring-2 focus:ring-primary/50 focus:border-primary text-gray-800 transition-all resize-none min-h-[110px] text-lg shadow-sm appearance-none" 
                        placeholder="請在此輸入..."></textarea>
                    <button id="clearButton" class="absolute top-2 right-2 text-gray-300 hover:text-red-500 p-2 rounded-full hover:bg-gray-50 transition hidden z-50">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
            </div>

            <!-- 手動按鈕 -->
            <button id="translateButton" class="bg-primary hover:bg-blue-600 text-white font-bold py-3.5 px-6 rounded-2xl shadow-lg hover:shadow-primary/30 transition active:scale-[0.98] flex items-center justify-center w-full">
                <span id="btnText">✨ 立即翻譯</span>
            </button>
            
            <div id="messageBox" class="text-center text-xs font-medium text-red-500 mt-2 hidden bg-red-50 py-2 rounded-lg"></div>

            <!-- 結果區塊 -->
            <div id="resultsContainer" class="space-y-4 hidden opacity-0 transition-opacity duration-500 pb-20">
                <div class="flex items-center justify-between px-1 pt-2">
                    <div class="flex items-center space-x-2">
                        <div class="h-1 w-1 bg-gray-300 rounded-full"></div>
                        <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">DETECTED:</span>
                        <span id="originalLang" class="text-sm font-bold text-gray-800"></span>
                    </div>
                </div>
                
                <!-- 韓文卡片 -->
                <div id="koreanCard" class="result-card editable-card relative bg-indigo-50/80 p-4 rounded-2xl border border-indigo-100 shadow-sm transition flex flex-col">
                    <div class="flex justify-between items-center mb-2">
                        <div class="flex items-center">
                            <span class="text-lg mr-2">🇰🇷</span><span class="font-bold text-indigo-900 text-sm">韓文 (Korean)</span>
                        </div>
                        <div class="flex items-center space-x-1">
                            <span id="koreanLoading" class="hidden text-indigo-400 text-[10px] animate-pulse">更新中...</span>
                            <button id="koreanCopyBtn" class="bg-white text-indigo-500 active:text-indigo-700 p-1.5 rounded-lg shadow-sm border border-indigo-100 active:scale-90 transition relative z-20">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div id="koreanCopiedBadge" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-30 opacity-0 pointer-events-none transition"><span class="bg-indigo-600/90 backdrop-blur text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-xl">✅ 已複製</span></div>
                    <textarea id="koreanResult" class="w-full bg-transparent text-indigo-900 resize-none focus:outline-none text-lg leading-relaxed rounded p-1 min-h-[80px] appearance-none"></textarea>
                </div>
                
                <!-- 中文卡片 -->
                <div id="chineseCard" class="result-card editable-card relative bg-red-50/80 p-4 rounded-2xl border border-red-100 shadow-sm transition flex flex-col">
                     <div class="flex justify-between items-center mb-2">
                        <div class="flex items-center">
                            <span class="text-lg mr-2">🇹🇼</span><span class="font-bold text-red-900 text-sm">中文 (Chinese)</span>
                        </div>
                        <div class="flex items-center space-x-1">
                            <span id="chineseLoading" class="hidden text-red-400 text-[10px] animate-pulse">更新中...</span>
                            <button id="chineseCopyBtn" class="bg-white text-red-500 active:text-red-700 p-1.5 rounded-lg shadow-sm border border-red-100 active:scale-90 transition relative z-20">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div id="chineseCopiedBadge" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-30 opacity-0 pointer-events-none transition"><span class="bg-red-600/90 backdrop-blur text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-xl">✅ 已複製</span></div>
                    <textarea id="chineseResult" class="w-full bg-transparent text-red-900 resize-none focus:outline-none text-lg leading-relaxed rounded p-1 min-h-[80px] appearance-none"></textarea>
                </div>

                <!-- 單字教學 -->
                <div id="vocabCard" class="bg-yellow-50 p-4 rounded-2xl border border-yellow-200/60 shadow-sm">
                    <div class="flex items-center mb-2">
                        <span class="text-lg mr-2">📚</span><span class="font-bold text-yellow-800 text-sm">單字筆記</span>
                    </div>
                    <div id="vocabContent" class="text-gray-700 space-y-1.5 font-medium leading-relaxed whitespace-pre-line text-sm pl-1"></div>
                </div>
                
                <!-- 歷史紀錄標題 -->
                <div class="pt-4 border-t border-gray-100">
                    <button id="toggleHistory" class="flex items-center justify-between w-full py-2 text-gray-500 font-bold text-sm">
                        <span>📜 歷史紀錄</span>
                        <span class="text-xs bg-gray-100 px-2 py-1 rounded-full">展開/收起</span>
                    </button>
                    <div id="historySection" class="hidden space-y-2 mt-2 max-h-60 overflow-y-auto pr-1">
                        <div class="flex justify-end"><button id="clearHistoryBtn" class="text-xs text-red-400 mb-2">清空</button></div>
                        <div id="historyList"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- 1. 初始化與變數 ---
        const inputText = document.getElementById('inputText');
        const translateButton = document.getElementById('translateButton');
        const btnText = document.getElementById('btnText');
        const clearButton = document.getElementById('clearButton');
        const resultsContainer = document.getElementById('resultsContainer');
        const originalLang = document.getElementById('originalLang');
        const messageBox = document.getElementById('messageBox');
        const toneSelect = document.getElementById('toneSelect');
        
        const koreanResult = document.getElementById('koreanResult');
        const chineseResult = document.getElementById('chineseResult');
        const koreanLoading = document.getElementById('koreanLoading');
        const chineseLoading = document.getElementById('chineseLoading');
        
        const vocabContent = document.getElementById('vocabContent');
        const historyList = document.getElementById('historyList');
        const historySection = document.getElementById('historySection');
        const typingStatus = document.getElementById('typingStatus');
        
        const apiKeyModal = document.getElementById('apiKeyModal');
        const saveApiKeyBtn = document.getElementById('saveApiKeyBtn');
        const settingsBtn = document.getElementById('settingsBtn');

        let debounceTimer;
        let reverseDebounceTimer; 
        const AUTO_TRANSLATE_DELAY = 1200; 

        // --- 2. 伺服器模式設定 ---
        function checkApiKey() {
            apiKeyModal.classList.add('hidden');
        }
        
        const savedTone = localStorage.getItem('translation_tone') || 'plain';
        toneSelect.value = savedTone;

        toneSelect.addEventListener('change', () => {
            localStorage.setItem('translation_tone', toneSelect.value);
            if (inputText.value.trim() !== '') {
                executeTranslation();
            }
        });
        
        saveApiKeyBtn.addEventListener('click', () => {
            apiKeyModal.classList.add('hidden');
        });

        settingsBtn.addEventListener('click', () => {
            apiKeyModal.classList.remove('hidden');
        });

        apiKeyModal.addEventListener('click', (e) => {
            if (e.target === apiKeyModal) {
                apiKeyModal.classList.add('hidden');
            }
        });

        checkApiKey();

        // --- 3. 核心翻譯邏輯 ---
        async function fetchGemini(promptText) {
            try {
                const response = await fetch('/api/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        promptText,
                        tone: toneSelect.value
                    })
                });

                if (response.status === 429) {
                    throw new Error("⏳ 請求太快了，請稍等一下再試 (429)");
                }
                if (!response.ok) {
                    let detail = "";
                    try {
                        const errorData = await response.json();
                        detail = errorData?.error ? ` - ${errorData.error}` : "";
                    } catch (_) {}
                    throw new Error(`API 連線錯誤: ${response.status}${detail}`);
                }
                
                return await response.json();

            } catch (e) {
                console.error("Gemini Error:", e);
                throw e; 
            }
        }

        async function executeTranslation() {
            const text = inputText.value.trim();
            if (!text) return;

            translateButton.disabled = true;
            btnText.textContent = "分析中...";
            translateButton.classList.add('opacity-75', 'cursor-not-allowed');
            typingStatus.classList.add('hidden');
            messageBox.classList.add('hidden');

            try {
                const res = await fetchGemini(text);
                
                resultsContainer.classList.remove('hidden');
                setTimeout(() => resultsContainer.classList.remove('opacity-0'), 10);
                
                originalLang.textContent = res.original_language;
                koreanResult.value = res.korean_translation;
                chineseResult.value = res.chinese_translation;
                
                // v6.9: 將 | 轉回換行符顯示
                let vocabText = res.vocabulary || "無重點單字";
                vocabContent.innerHTML = vocabText.replace(/\|/g, '<br>');

                [koreanResult, chineseResult].forEach(adjustHeight);
                saveHistory(text, res);

            } catch (err) {
                console.error(err);
                messageBox.textContent = err.message; 
                messageBox.classList.remove('hidden');
            } finally {
                translateButton.disabled = false;
                btnText.textContent = "✨ 立即翻譯";
                translateButton.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        }

        async function updateFromResult(sourceType, text) {
            if (!text.trim()) return;
            
            if (sourceType === 'korean') {
                koreanLoading.classList.remove('hidden');
                document.getElementById('koreanCard').classList.add('editing-indicator');
            } else {
                chineseLoading.classList.remove('hidden');
                document.getElementById('chineseCard').classList.add('editing-indicator');
            }

            try {
                const res = await fetchGemini(text);
                
                if (sourceType === 'korean') {
                    chineseResult.value = res.chinese_translation;
                    // v6.9: 反向翻譯也要處理 | 符號
                    vocabContent.innerHTML = (res.vocabulary || "").replace(/\|/g, '<br>');
                    adjustHeight(chineseResult);
                } else {
                    koreanResult.value = res.korean_translation;
                    vocabContent.innerHTML = (res.vocabulary || "").replace(/\|/g, '<br>');
                    adjustHeight(koreanResult);
                }
            } catch (err) {
                console.error("Reverse translation failed", err);
            } finally {
                koreanLoading.classList.add('hidden');
                chineseLoading.classList.add('hidden');
                document.getElementById('koreanCard').classList.remove('editing-indicator');
                document.getElementById('chineseCard').classList.remove('editing-indicator');
            }
        }

        // --- 4. 監聽器設定 ---

        inputText.addEventListener('input', () => {
            clearButton.classList.remove('hidden');
            if(inputText.value.trim() === '') clearButton.classList.add('hidden');
            clearTimeout(debounceTimer);
            typingStatus.classList.remove('hidden');
            debounceTimer = setTimeout(executeTranslation, AUTO_TRANSLATE_DELAY);
        });

        koreanResult.addEventListener('input', () => {
            clearTimeout(reverseDebounceTimer);
            koreanLoading.classList.remove('hidden');
            reverseDebounceTimer = setTimeout(() => {
                updateFromResult('korean', koreanResult.value);
            }, 1500); 
        });

        chineseResult.addEventListener('input', () => {
            clearTimeout(reverseDebounceTimer);
            chineseLoading.classList.remove('hidden');
            reverseDebounceTimer = setTimeout(() => {
                updateFromResult('chinese', chineseResult.value);
            }, 1500);
        });

        function adjustHeight(el) {
            el.style.height = 'auto';
            el.style.height = (el.scrollHeight) + 'px';
        }

        clearButton.addEventListener('click', () => {
            inputText.value = '';
            clearButton.classList.add('hidden');
            resultsContainer.classList.add('hidden');
            resultsContainer.classList.add('opacity-0');
            inputText.focus();
        });

        document.getElementById('toggleHistory').addEventListener('click', () => {
            historySection.classList.toggle('hidden');
        });

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('translation_history_v4') || '[]');
            historyList.innerHTML = '';
            if (history.length === 0) {
                historyList.innerHTML = '<p class="text-gray-400 text-center py-4 text-xs italic">尚無紀錄</p>';
                return;
            }
            history.forEach(item => {
                const el = document.createElement('div');
                el.className = 'p-3 bg-white rounded-lg border border-gray-100 hover:border-blue-200 active:bg-blue-50 transition cursor-pointer flex justify-between group shadow-sm';
                el.innerHTML = `
                    <div class="truncate text-sm text-gray-700 w-full pr-2">${item.input}</div>
                    <span class="text-xs text-gray-400 whitespace-nowrap">${new Date(item.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                `;
                el.addEventListener('click', () => {
                    inputText.value = item.input;
                    executeTranslation();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
                historyList.appendChild(el);
            });
        }

        function saveHistory(input, res) {
            const history = JSON.parse(localStorage.getItem('translation_history_v4') || '[]');
            if (history.length > 0 && history[0].input === input) return;
            history.unshift({ input, res, time: Date.now() });
            if (history.length > 20) history.pop(); 
            localStorage.setItem('translation_history_v4', JSON.stringify(history));
            loadHistory();
        }

        document.getElementById('clearHistoryBtn').addEventListener('click', () => {
            if(confirm('確定清空紀錄？')) {
                localStorage.removeItem('translation_history_v4');
                loadHistory();
            }
        });

        // --- 5. 複製功能設定 (按鈕 + 雙擊) ---
        function setupInteractions(cardId, textareaId, btnId, badgeId) {
            const card = document.getElementById(cardId);
            const textarea = document.getElementById(textareaId);
            const copyBtn = document.getElementById(btnId);
            const badge = document.getElementById(badgeId);

            const performCopy = () => {
                if (!textarea.value) return;
                textarea.select();
                document.execCommand('copy');
                badge.classList.remove('opacity-0');
                badge.classList.add('animate-fade-in-up');
                setTimeout(() => {
                    badge.classList.add('opacity-0');
                    badge.classList.remove('animate-fade-in-up');
                }, 1000);
            };

            copyBtn.addEventListener('click', (e) => {
                e.stopPropagation(); 
                performCopy();
            });

            card.addEventListener('dblclick', (e) => {
                if (e.target !== copyBtn && !copyBtn.contains(e.target)) {
                    performCopy();
                }
            });
        }

        setupInteractions('koreanCard', 'koreanResult', 'koreanCopyBtn', 'koreanCopiedBadge');
        setupInteractions('chineseCard', 'chineseResult', 'chineseCopyBtn', 'chineseCopiedBadge');
        
        loadHistory();
        translateButton.addEventListener('click', executeTranslation);

    </script>
</body>
</html>
